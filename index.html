<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Expense Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💰%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface-light:#2a2a2a;--border:#333;--text:#fff;--text-secondary:#a0a0a0;--accent-yellow:#f59e0b;--accent-green:#10b981;--accent-red:#ef4444;--accent-blue:#3b82f6;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{height:100%;position:relative}
.screen{position:fixed;top:0;left:0;right:0;bottom:0;height:100dvh;background:var(--bg);display:none;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
.screen.active{display:flex}
.scroll-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.header-stats{display:flex;gap:20px;text-align:center}
.stat-label{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:15px;font-weight:600;margin-top:2px}
.stat-value.expense{color:var(--accent-red)}
.stat-value.income{color:var(--accent-green)}
.icon-btn{background:none;border:none;color:var(--text);font-size:20px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.grid-section{margin-bottom:20px}
.grid-section h3{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-left:4px;display:flex;justify-content:space-between;align-items:center}
.grid-section h3 .section-total{color:var(--text);font-size:14px;text-transform:none;letter-spacing:0}
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.icon-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;user-select:none;-webkit-user-select:none}
.icon-circle{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--surface-light);border:2px solid transparent;transition:transform .1s}
.icon-item:active .icon-circle{transform:scale(.95)}
.account-item .icon-circle{background:rgba(245,158,11,.15);border-color:var(--accent-yellow)}
.category-item .icon-circle{background:rgba(16,185,129,.15);border-color:var(--accent-green)}
.income-item .icon-circle{background:rgba(59,130,246,.15);border-color:var(--accent-blue)}
.add-btn .icon-circle{background:transparent;border:2px dashed var(--border);color:var(--text-secondary);font-size:22px}
.icon-label{margin-top:4px;font-size:10px;color:var(--text-secondary);text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-amount{font-size:10px;margin-top:1px;font-weight:600}
.account-item .icon-amount{color:var(--accent-yellow)}
.category-item .icon-amount{color:var(--accent-green)}
.income-item .icon-amount{color:var(--accent-blue)}
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent-green);color:white;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);cursor:pointer;z-index:10}
.calc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.calc-close,.calc-check{background:none;border:none;color:var(--text);font-size:20px;width:44px;height:44px;cursor:pointer}
.calc-selectors{display:flex;align-items:center;gap:6px;font-size:14px}
.calc-selectors button{background:none;border:none;color:var(--text-secondary);font-size:14px;cursor:pointer;padding:4px 6px}
.calc-selectors button.hidden{display:none}
.calc-tags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;min-height:40px;flex-shrink:0}
.tag-pill{background:var(--surface-light);border:1px solid var(--border);color:var(--text-secondary);padding:3px 10px;border-radius:14px;font-size:12px;cursor:pointer}
.tag-pill.active{background:var(--accent-blue);color:white;border-color:var(--accent-blue)}
.add-tag-btn{margin:0 16px 6px;background:none;border:1px dashed var(--border);color:var(--text-secondary);padding:5px 10px;border-radius:14px;font-size:12px;cursor:pointer;flex-shrink:0}
.calc-display{background:var(--surface);padding:12px 20px;text-align:right;flex-shrink:0}
.calc-amount-input{font-size:clamp(28px,9vw,42px);font-weight:300;letter-spacing:-1px;display:flex;align-items:baseline;justify-content:flex-end;gap:6px}
.calc-currency{font-size:16px;color:var(--text-secondary);font-weight:500;cursor:pointer;padding:2px 6px;border-radius:6px}
.calc-currency:active{background:var(--surface-light)}
.calc-converted{font-size:13px;color:var(--text-secondary);margin-top:2px;height:20px}
.calc-type-toggle{display:flex;padding:6px 16px;gap:6px;flex-shrink:0}
.type-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer}
.type-btn.active[data-type="expense"]{background:rgba(239,68,68,.15);color:var(--accent-red);border-color:var(--accent-red)}
.type-btn.active[data-type="income"]{background:rgba(16,185,129,.15);color:var(--accent-green);border-color:var(--accent-green)}
.numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,1.2vw,8px);padding:6px 16px calc(6px + var(--safe-bottom));place-items:center;flex:1;align-content:center}
.numpad-btn{width:100%;max-width:clamp(52px,16vw,72px);aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:clamp(18px,5vw,22px);font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.numpad-btn:active{background:var(--surface-light)}
.numpad-btn.utility{color:var(--text-secondary);font-size:clamp(15px,4vw,18px)}
.calc-footer{display:flex;justify-content:space-around;padding:8px 16px calc(8px + var(--safe-bottom));border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.calc-footer button{background:none;border:none;color:var(--text-secondary);font-size:13px;cursor:pointer;padding:6px 12px}
.list-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.list-header h2{font-size:16px;font-weight:600;flex:1;text-align:center}
.filter-chips{flex:1;display:flex;gap:6px;overflow-x:auto}
.chip{background:var(--accent-green);color:white;padding:3px 10px;border-radius:14px;font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:4px}
.chip button{background:none;border:none;color:white;font-size:13px;cursor:pointer}
.list-total{padding:10px 16px;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid var(--border);background:var(--surface)}
.date-group{margin-bottom:12px}
.date-header{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px 6px}
.transaction-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.transaction-item:active{background:var(--surface-light)}
.tx-left{display:flex;flex-direction:column;gap:1px}
.tx-account{font-size:12px;color:var(--text-secondary)}
.tx-category{font-size:15px;font-weight:500}
.tx-tags{font-size:11px;color:var(--text-secondary);margin-top:1px}
.tx-right{text-align:right}
.tx-amount{font-size:16px;font-weight:600}
.tx-amount.expense{color:var(--accent-red)}
.tx-amount.income{color:var(--accent-green)}
.tx-converted{font-size:11px;color:var(--text-secondary)}
.form-content{padding:20px 16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-group input,.form-group select{width:100%;background:var(--surface-light);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:16px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent-green)}
.form-group small{display:block;margin-top:3px;font-size:11px;color:var(--text-secondary)}
.icon-picker{width:72px;height:72px;border-radius:50%;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;cursor:pointer;background:var(--surface-light)}
.btn-primary{width:100%;padding:14px;background:var(--accent-green);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.btn-danger{width:100%;padding:14px;background:var(--accent-red);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}
.btn-secondary{width:100%;padding:12px;background:var(--surface-light);color:var(--text);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer}
.report-filters{padding:14px}
.filter-group{margin-bottom:14px}
.multi-select{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.select-pill{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:var(--surface-light);color:var(--text-secondary);font-size:12px;cursor:pointer}
.select-pill.selected{background:var(--accent-blue);color:white;border-color:var(--accent-blue)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal.active{display:flex}
.modal-content{background:var(--surface);width:100%;max-height:70%;border-radius:20px 20px 0 0;padding:16px 16px calc(16px + var(--safe-bottom));overflow-y:auto}
.modal-content h3{text-align:center;margin-bottom:14px;font-size:16px}
.picker-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.picker-item:active{background:var(--surface-light)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);font-size:14px}
.daily-total{text-align:right;padding:6px 16px;font-size:13px;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border)}
.report-summary{background:var(--surface-light);padding:14px;border-radius:10px;margin-bottom:14px}
.report-summary-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
.report-summary-row:last-child{margin-bottom:0}
#offline-banner{position:fixed;top:0;left:0;right:0;background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:12px;font-weight:600;z-index:9999}
</style>
</head>
<body>
<div id="app">
<div id="screen-dashboard" class="screen active">
<header class="app-header">
<button class="icon-btn" onclick="app.openSettings()">⚙️</button>
<div class="header-stats">
<div><div class="stat-label">Balance</div><div class="stat-value" id="dash-balance">$0</div></div>
<div><div class="stat-label">Expenses</div><div class="stat-value expense" id="dash-expenses">$0</div></div>
<div><div class="stat-label">Income</div><div class="stat-value income" id="dash-income">$0</div></div>
</div>
<button class="icon-btn" onclick="app.openReports()">📊</button>
</header>
<div class="scroll-content">
<section class="grid-section">
<h3>Income <span class="section-total" id="income-total"></span></h3>
<div class="icon-grid" id="income-grid">
<div class="icon-item income-item" onclick="app.openCalculator('income')">
<div class="icon-circle income-bg">💵</div>
<span class="icon-label">Add Income</span>
<span class="icon-amount" id="income-amount">$0</span>
</div>
</div>
</section>
<section class="grid-section"><h3>Accounts</h3><div class="icon-grid" id="accounts-grid"></div></section>
<section class="grid-section"><h3>Categories</h3><div class="icon-grid" id="categories-grid"></div></section>
</div>
<button class="fab" onclick="app.openCalculator()">＋</button>
</div>

<div id="screen-calculator" class="screen">
<div class="calc-header">
<button class="calc-close" onclick="app.showDashboard()">✕</button>
<div class="calc-selectors">
<button id="calc-account-btn" onclick="app.showAccountPicker()">Account</button>
<span id="calc-separator">›</span>
<button id="calc-category-btn" onclick="app.showCategoryPicker()">Category</button>
</div>
<button class="calc-check" onclick="app.saveTransaction()">✓</button>
</div>
<div class="calc-tags" id="calc-tags"></div>
<button class="add-tag-btn" onclick="app.addTagPrompt()">+ Tag</button>
<div class="calc-display">
<div class="calc-amount-input"><span id="calc-amount">0</span><span class="calc-currency" id="calc-currency" onclick="app.showCurrencyPicker()">USD</span></div>
<div class="calc-converted" id="calc-converted"></div>
</div>
<div class="calc-type-toggle">
<button class="type-btn active" data-type="expense" onclick="app.setType('expense')">Expense</button>
<button class="type-btn" data-type="income" onclick="app.setType('income')">Income</button>
</div>
<div class="numpad">
<button class="numpad-btn utility" onclick="app.calcNote()">💬</button>
<button class="numpad-btn utility" onclick="app.calcClear()">C</button>
<button class="numpad-btn utility" onclick="app.calcPercent()">％</button>
<button class="numpad-btn utility" onclick="app.calcOp('+')">＋</button>
<button class="numpad-btn" onclick="app.calcDigit(1)">1</button>
<button class="numpad-btn" onclick="app.calcDigit(2)">2</button>
<button class="numpad-btn" onclick="app.calcDigit(3)">3</button>
<button class="numpad-btn utility" onclick="app.calcOp('-')">−</button>
<button class="numpad-btn" onclick="app.calcDigit(4)">4</button>
<button class="numpad-btn" onclick="app.calcDigit(5)">5</button>
<button class="numpad-btn" onclick="app.calcDigit(6)">6</button>
<button class="numpad-btn utility" onclick="app.calcOp('×')">×</button>
<button class="numpad-btn" onclick="app.calcDigit(7)">7</button>
<button class="numpad-btn" onclick="app.calcDigit(8)">8</button>
<button class="numpad-btn" onclick="app.calcDigit(9)">9</button>
<button class="numpad-btn utility" onclick="app.calcOp('÷')">÷</button>
<button class="numpad-btn" onclick="app.calcDecimal()">,</button>
<button class="numpad-btn" onclick="app.calcDigit(0)">0</button>
<button class="numpad-btn" onclick="app.calcBackspace()">⌫</button>
<button class="numpad-btn utility" onclick="app.calcEquals()">＝</button>
</div>
<div class="calc-footer">
<button onclick="app.setDate('yesterday')">Yesterday</button>
<button onclick="app.setDate('today')" id="btn-today">Today</button>
<button onclick="app.showDatePicker()">📅 <span id="calc-date-label"></span></button>
</div>
</div>

<div id="screen-list" class="screen">
<header class="list-header">
<button class="icon-btn" onclick="app.showDashboard()">←</button>
<div class="filter-chips" id="filter-chips"></div>
<button class="icon-btn" onclick="app.showDateRangePicker()">📅</button>
</header>
<div class="list-total" id="list-total"></div>
<div class="scroll-content" id="transaction-list"></div>
</div>

<div id="screen-reports" class="screen">
<header class="list-header">
<button class="icon-btn" onclick="app.showDashboard()">←</button>
<h2>Reports</h2>
</header>
<div class="scroll-content report-filters">
<div class="filter-group"><label>From</label><input type="date" id="report-from"></div>
<div class="filter-group"><label>To</label><input type="date" id="report-to"></div>
<div class="filter-group"><label>Accounts</label><div class="multi-select" id="report-accounts"></div></div>
<div class="filter-group"><label>Categories</label><div class="multi-select" id="report-categories"></div></div>
<div class="filter-group"><label>Tags</label><div class="multi-select" id="report-tags"></div></div>
<button class="btn-primary" onclick="app.runReport()">Generate Report</button>
<div id="report-results"></div>
</div>
</div>

<div id="screen-settings" class="screen">
<header class="list-header">
<button class="icon-btn" onclick="app.showDashboard()">←</button>
<h2>Settings</h2>
</header>
<div class="scroll-content settings-form">
<div class="form-group">
<label>Period Start Day</label>
<input type="number" id="setting-period-day" min="1" max="31" value="1">
<small>Day of month when your budget period starts</small>
</div>
<div class="form-group">
<label>Default Currency</label>
<select id="setting-currency"></select>
</div>
<button class="btn-primary" onclick="app.saveSettings()">Save Settings</button>
</div>
</div>

<div id="screen-form" class="screen">
<header class="list-header">
<button class="icon-btn" onclick="app.showDashboard()">✕</button>
<h2 id="form-title">Add</h2>
<button class="icon-btn" onclick="app.saveForm()">✓</button>
</header>
<div class="scroll-content form-content">
<div class="icon-picker" id="form-icon">📁</div>
<div class="form-group"><label>Name</label><input type="text" id="form-name" placeholder="Enter name"></div>
<div class="form-group" id="form-balance-group"><label>Initial Balance</label><input type="number" id="form-balance" placeholder="0"></div>
<div class="form-group"><label>Currency</label><select id="form-currency"></select></div>
<input type="hidden" id="form-type"><input type="hidden" id="form-id">
<button class="btn-danger" id="form-delete-btn" onclick="app.deleteForm()" style="display:none;">Delete</button>
</div>
</div>

<div class="modal" id="picker-modal" onclick="if(event.target===this)app.closeModal()">
<div class="modal-content"><h3 id="picker-title">Select</h3><div id="picker-list"></div></div>
</div>
<div class="modal" id="date-modal" onclick="if(event.target===this)app.closeModal()">
<div class="modal-content"><h3>Select Date</h3><input type="date" id="modal-date-input"><button class="btn-primary" onclick="app.confirmDate()">Done</button></div>
</div>
</div>

<script>
if(!window.crypto||!crypto.randomUUID){window.crypto=window.crypto||{};crypto.randomUUID=function(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);return v.toString(16)})}}

const SUPABASE_URL='https://xmbzdeizupztebxsvgic.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtYnpkZWl6dXB6dGVieHN2Z2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDc4NzIsImV4cCI6MjA5MjM4Mzg3Mn0.RQVYC88Ou1O8X0mVLwfn3uj91M2p0hhhsWORXwbQEzE';
let supabase=null,useSupabase=false;

function initSupabase(){if(typeof window.supabase!=='undefined'&&window.supabase.createClient){try{supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);useSupabase=true;console.log('Supabase OK');loadFromSupabase()}catch(e){console.error('Supabase err',e)}}else{setTimeout(initSupabase,200)}}

async function syncToSupabase(){if(!useSupabase||!supabase)return;try{if(state.accounts.length){await supabase.from('accounts').upsert(state.accounts,{onConflict:'id'})}if(state.categories.length){await supabase.from('categories').upsert(state.categories,{onConflict:'id'})}if(state.transactions.length){await supabase.from('transactions').upsert(state.transactions,{onConflict:'id'})}const{data:ex}=await supabase.from('settings').select('id').limit(1);if(ex&&ex.length){await supabase.from('settings').update(state.settings).eq('id',ex[0].id)}console.log('sync done')}catch(e){console.log('sync err',e)}}

async function loadFromSupabase(){if(!useSupabase||!supabase)return;try{const[{data:a},{data:c},{data:t},{data:s}]=await Promise.all([supabase.from('accounts').select('*'),supabase.from('categories').select('*'),supabase.from('transactions').select('*').order('date',{ascending:false}),supabase.from('settings').select('*').limit(1)]);let h=false;if(a&&a.length){state.accounts=a;h=true}if(c&&c.length){state.categories=c;h=true}if(t&&t.length){state.transactions=t;h=true}if(s&&s.length){state.settings=s[0];h=true}if(h){storage.set('accounts',state.accounts);storage.set('categories',state.categories);storage.set('transactions',state.transactions);storage.set('settings',state.settings);renderDashboard();console.log('loaded cloud')}else{console.log('no cloud data');await syncToSupabase()}}catch(e){console.log('cloud load fail',e)}}
